<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codebrainhub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <h1 class="logo">Codebrainhub</h1>
      <button id="openModal" class="btn-primary">Submit Idea</button>
    </div>
  </nav>

  <main>
    <div id="ideaGrid" class="idea-grid"></div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Share Your App Idea</h2>
        <button id="closeModal" class="btn-close">&times;</button>
      </div>
      <form id="ideaForm">
        <div class="form-group">
          <label for="appName">App Name *</label>
          <input type="text" id="appName" required placeholder="My Awesome App">
        </div>
        <div class="form-group">
          <label for="description">Description *</label>
          <textarea id="description" required rows="4" placeholder="What does your app do?"></textarea>
        </div>
        <div class="form-group">
          <label for="screenshotUrl">Screenshot URL (optional)</label>
          <input type="url" id="screenshotUrl" placeholder="https://example.com/screenshot.png">
        </div>
        <button type="submit" class="btn-primary">Submit Idea</button>
      </form>
    </div>
  </div>

  <div id="commentsModal" class="modal hidden">
    <div class="modal-content comments-modal">
      <div class="modal-header">
        <h2 id="commentsTitle">Comments</h2>
        <button id="closeComments" class="btn-close">&times;</button>
      </div>
      <div id="commentsList"></div>
      <form id="commentForm" class="comment-form">
        <input type="text" id="commentAuthor" required placeholder="Your name">
        <textarea id="commentText" required rows="2" placeholder="Add a comment..."></textarea>
        <button type="submit" class="btn-primary">Post Comment</button>
      </form>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
